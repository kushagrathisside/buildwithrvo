# RVO configuration
#
# Camera source: use device_index for a local webcam, or source_uri for an
# RTSP stream, video file, or any URI that OpenCV accepts.
camera:
  device_index: 0
  # source_uri: "rtsp://user:pass@192.168.1.100:554/stream"

# Output directory for clip evidence (JPEG frames + meta.json).
# Created automatically if it does not exist.
clips_dir: clips

# Optional JSON-lines event log. Each confirmed event is appended as one line.
# Omit or comment out to disable file output.
# event_log: events.jsonl

detectors:
  - kind: dummy
    enabled: true

  - kind: load
    enabled: true
    busy_ns: 3000000     # 3ms busy-spin — simulates a medium-cost model

  - kind: jitter
    enabled: false

# Events trigger when their condition holds continuously for duration_ms.
# After firing they are suppressed for cooldown_ms.
#
# signal_type values: Dummy | MotionLevel | FacePresent | PersonDetected
# signal_threshold: the signal value must be >= this to satisfy the condition.
events:
  - event_type: DummyEvent
    signal_type: Dummy
    signal_threshold: 1
    duration_ms: 2000
    cooldown_ms: 5000
